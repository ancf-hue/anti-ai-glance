
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>Анти ИИ Взгляд — безопасность прежде всего</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body {
            background:#000; color:#0f0; font-family:system-ui, -apple-system, monospace;
            text-align:center; padding:20px; margin:0; min-height:100dvh;
            display:flex; flex-direction:column; align-items:center; touch-action:manipulation;
        }
        video {
            display:block; margin:0 auto; max-width:100%; width:100%; max-width:400px;
            border-radius:20px; border:1px solid #222; background:#000;
        }
        button {
            background:#00d4aa; color:#000; border:none;
            width: 50vw;
            max-width: 420px;
            min-width: 220px;
            padding: 20px 16px;
            font-size: 1.7rem;
            font-weight: 700;
            border-radius: 64px;
            box-shadow:0 6px 20px rgba(0,212,170,0.4);
            cursor:pointer;
            transition:transform 0.1s ease, background 0.2s;
            margin: 72px auto 24px auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            line-height: 1.2;
            height: 50vh;
            min-height: 200px;
        }
        button:active { transform:scale(0.97); background:#00c09a; }
        button:disabled { opacity:0.6; cursor:not-allowed; transform:none; background:#00d4aa; }
        
        .btn-logo {
            width: 1.8em;
            height: 1.8em;
            object-fit: contain;
            display: inline-block;
            vertical-align: middle;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2));
        }
        
        #status {
            color: transparent !important;
            text-indent: -9999px !important;
            overflow: hidden !important;
            white-space: nowrap !important;
            min-height: 0 !important;
            height: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            border: none !important;
            background: transparent !important;
            display: block !important;
        }
        
        .status {
            margin:20px 0; font-size:1.1rem; padding:10px 16px;
            background:#111; border-radius:24px; border:1px solid #222;
            min-height:2.2em; display:flex; align-items:center; justify-content:center;
            width:100%; max-width:400px; text-align:center; line-height:1.4;
        }
        .status.warn { color:#ffaa00; }
        .status.error { color:#ff6666; }
        .status.water { color:#66ccff; }
        .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }
        #debugCanvas { display:none; }
        
        @media (max-width: 560px) {
            button {
                width: 70vw;
                font-size: 1.5rem;
                padding: 18px 12px;
                margin-top: 60px;
                height: 50vh;
                min-height: 180px;
            }
            .btn-logo {
                width: 1.5em;
                height: 1.5em;
            }
        }
        @media (min-width: 800px) {
            button {
                width: 40vw;
                max-width: 480px;
                height: 50vh;
                min-height: 220px;
            }
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="debugCanvas"></canvas>
    
    <div>
        <button id="startBtn">
            <img class="btn-logo" src="favicon.ico" alt="логотип защиты" onerror="this.style.display='none'">
            <span>ВКЛЮЧИТЬ ЗАЩИТУ</span>
        </button>
    </div>
    
    <div id="status" class="status" role="status" aria-live="assertive" aria-atomic="true">
        ⚫ Нажмите для включения защиты
    </div>
    
    <span class="sr-only">
        Анти И И Взгляд — система безопасности для незрячих.
        Предупреждает о ямах, лужах, ветках, деревьях, ступеньках.
        Работает офлайн на любом устройстве: телефон, планшет, ноутбук.
        Тиканье каждые 5 секунд подтверждает, что защита активна.
    </span>

    <script>
        "use strict";

        // ============================================================
        // 1. ОПРЕДЕЛЕНИЕ УСТРОЙСТВА (максимальная совместимость)
        // ============================================================
        const DEVICE = {
            hasVibration: 'vibrate' in navigator,
            hasSpeech: 'speechSynthesis' in window,
            hasMotion: 'DeviceMotionEvent' in window,
            hasBattery: 'getBattery' in navigator,
            hasOrientation: 'DeviceOrientationEvent' in window,
            isMobile: /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent),
            isLowEnd: /Android.*[2-6]\./i.test(navigator.userAgent) || navigator.deviceMemory < 2
        };

        // ============================================================
        // 2. УНИВЕРСАЛЬНЫЕ ФУНКЦИИ (работают везде)
        // ============================================================
        function speakText(text, urgent = false) {
            if (!DEVICE.hasSpeech) return;
            if (!urgent && window.speechSynthesis && window.speechSynthesis.speaking) return;
            try {
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ru-RU';
                u.rate = 1.0;
                u.pitch = 1.0;
                u.volume = 1.0;
                window.speechSynthesis.speak(u);
            } catch(e) { console.warn('Speech:', e); }
        }

        function vibratePhone(pattern) {
            if (DEVICE.hasVibration && navigator.vibrate) {
                try { navigator.vibrate(pattern); } catch(e) {}
            }
        }

        function beepSound(freq, dur, gainVal = 0.3) {
            if (!state.audioCtx) return;
            if (state.audioCtx.state === 'suspended') state.audioCtx.resume().catch(()=>{});
            try {
                const osc = state.audioCtx.createOscillator();
                const gain = state.audioCtx.createGain();
                osc.connect(gain); gain.connect(state.audioCtx.destination);
                osc.frequency.value = freq;
                osc.type = 'square';
                gain.gain.setValueAtTime(gainVal, state.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, state.audioCtx.currentTime + dur);
                osc.start(); osc.stop(state.audioCtx.currentTime + dur);
            } catch(e) {}
        }

        // ============================================================
        // 3. ТРЕВОГИ: ЧЕТКИЕ, РАЗЛИЧИМЫЕ, БЕЗОПАСНЫЕ
        // ============================================================
        function alertWater() {
            speakText('Лужа', true);
            vibratePhone([100, 50, 100, 50, 100]);
            beepSound(500, 0.2, 0.35);
            updateStatus('💧 ЛУЖА', 'water');
            log('ALERT: water');
        }

        function alertDrop() {
            speakText('Яма', true);
            vibratePhone([300, 100, 300]);
            beepSound(900, 0.15, 0.4);
            updateStatus('🕳️ ЯМА', 'error');
            log('ALERT: drop');
        }

        function alertObstacle() {
            speakText('Препятствие', true);
            vibratePhone([200, 80, 200]);
            beepSound(750, 0.12, 0.35);
            updateStatus('🌳 ПРЕПЯТСТВИЕ', 'warn');
            log('ALERT: obstacle');
        }

        function alertFall() {
            speakText('Провал', true);
            vibratePhone([400, 100, 400]);
            beepSound(1000, 0.2, 0.45);
            updateStatus('🔥 ПРОВАЛ', 'error');
            log('ALERT: fall');
        }

        function updateStatus(msg, type = 'ok') {
            statusDiv.textContent = msg;
            statusDiv.className = 'status' + (type === 'warn' ? ' warn' : type === 'error' ? ' error' : type === 'water' ? ' water' : '');
        }

        function log(msg) {
            if (CONFIG.DEBUG) console.log('[' + new Date().toLocaleTimeString() + '] ' + msg);
        }

        // ============================================================
        // 4. КОНФИГУРАЦИЯ: БЕЗОПАСНОСТЬ > ЭКОНОМИЯ > УМ
        // ============================================================
        const CONFIG = {
            ZONE_HEAD_START: 0.0,
            ZONE_HEAD_END: 0.2,
            ZONE_CHEST_START: 0.2,
            ZONE_CHEST_END: 0.5,
            ZONE_GROUND_START: 0.7,
            ZONE_GROUND_END: 1.0,
            GRID_COLS: 4,
            GRID_ROWS_PER_ZONE: 2,
            SENSITIVITY_OBSTACLE: 0.45,
            SENSITIVITY_DROP: 0.35,
            SENSITIVITY_WATER: 0.40,
            SENSITIVITY_MIN: 0.30,
            SENSITIVITY_MAX: 0.75,
            GLOBAL_MOTION_THRESHOLD: 0.55,
            CONFIRM_FRAMES_OBSTACLE: 2,
            CONFIRM_FRAMES_DROP: 1,
            CONFIRM_FRAMES_WATER: 2,
            ALERT_COOLDOWN: 2500,
            WATER_SPECULAR_THRESHOLD: 0.85,
            WATER_COLOR_BLUE_THRESHOLD: 1.15,
            WATER_TEXTURE_SMOOTH: 0.20,
            WATER_MIN_BRIGHTNESS: 180,
            DROP_EDGE_CONTRAST: 0.70,
            DROP_TEXTURE_LOSS: 0.50,
            DROP_PARALLAX_MIN: 0.20,
            LUX_DARK_THRESHOLD: 80,
            LUX_BRIGHT_THRESHOLD: 200,
            ADAPTATION_RATE: 0.10,
            HISTORY_FRAMES: 10,
            WORK_WIDTH: 128,
            WORK_HEIGHT: 96,
            TARGET_FPS: DEVICE.isLowEnd ? 5 : 7,
            FRAME_SKIP_LOW_BATTERY: 15,
            HEARTBEAT_INTERVAL: 5000,
            HEARTBEAT_VIBRATION: [20],
            BATTERY_WARN_LEVELS: [20, 10, 5],
            BATTERY_WARN_COOLDOWN: 300000,
            DEBUG: false
        };

        // ============================================================
        // 5. СОСТОЯНИЕ СИСТЕМЫ
        // ============================================================
        let state = {
            isRunning: false,
            isCalibrated: false,
            ambientLux: null,
            sceneBrightness: 128,
            adaptiveSensitivity: { obstacle: 0.45, drop: 0.35, water: 0.40 },
            brightnessHistory: [],
            zones: {
                head: { alerts: 0, lastAlert: 0 },
                chest: { alerts: 0, lastAlert: 0 },
                ground: { alerts: 0, lastAlert: 0 }
            },
            zoneHistory: { head: [], chest: [], ground: [] },
            prevFrame: null,
            prevZoneAvg: { head: 128, chest: 128, ground: 128 },
            analysisTimer: null,
            heartbeatTimer: null,
            batteryTimer: null,
            audioCtx: null,
            mediaStream: null,
            videoTrack: null,
            motionHandler: null,
            orientationHandler: null,
            lastAccelZ: null,
            accelCooldown: 0,
            batteryObj: null,
            lastBatteryWarn: 0,
            lastAlertTime: 0,
            lastHeartbeat: 0,
            frameCount: 0,
            alertStats: { water: 0, drop: 0, obstacle: 0, fall: 0 }
        };

        // ============================================================
        // 6. DOM
        // ============================================================
        const videoEl = document.getElementById('video');
        const canvas = document.getElementById('debugCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');

        // ============================================================
        // 7. СЕРДЦЕБИЕНИЕ
        // ============================================================
        function startHeartbeat() {
            if (state.heartbeatTimer) clearInterval(state.heartbeatTimer);
            state.heartbeatTimer = setInterval(() => {
                if (!state.isRunning) return;
                if (Date.now() - state.lastAlertTime < 8000) return;
                vibratePhone(CONFIG.HEARTBEAT_VIBRATION);
                state.lastHeartbeat = Date.now();
                if (CONFIG.DEBUG) log('❤️ Heartbeat');
            }, CONFIG.HEARTBEAT_INTERVAL);
        }

        // ============================================================
        // 8. АДАПТАЦИЯ К ОСВЕЩЕНИЮ
        // ============================================================
        function updateAdaptation(brightness) {
            state.sceneBrightness = brightness;
            state.brightnessHistory.push(brightness);
            if (state.brightnessHistory.length > CONFIG.HISTORY_FRAMES) {
                state.brightnessHistory.shift();
            }
            const avgHist = state.brightnessHistory.reduce((a,b)=>a+b,0) / state.brightnessHistory.length;
            let adjust = 0;
            if (avgHist < CONFIG.LUX_DARK_THRESHOLD) {
                adjust = +0.15;
            } else if (avgHist > CONFIG.LUX_BRIGHT_THRESHOLD) {
                adjust = -0.05;
            }
            state.adaptiveSensitivity.obstacle += (CONFIG.SENSITIVITY_OBSTACLE + adjust - state.adaptiveSensitivity.obstacle) * CONFIG.ADAPTATION_RATE;
            state.adaptiveSensitivity.drop += (CONFIG.SENSITIVITY_DROP + adjust - state.adaptiveSensitivity.drop) * CONFIG.ADAPTATION_RATE;
            state.adaptiveSensitivity.water += (CONFIG.SENSITIVITY_WATER + adjust - state.adaptiveSensitivity.water) * CONFIG.ADAPTATION_RATE;
            for (let key in state.adaptiveSensitivity) {
                state.adaptiveSensitivity[key] = Math.min(CONFIG.SENSITIVITY_MAX, Math.max(CONFIG.SENSITIVITY_MIN, state.adaptiveSensitivity[key]));
            }
        }

        // ============================================================
        // 9. АНАЛИЗ ЗОНЫ
        // ============================================================
        function detectWater(imgData, x, y, w, h) {
            const data = imgData.data;
            const W = imgData.width;
            let brightSum = 0, blueSum = 0, redSum = 0, textureSum = 0, cnt = 0;
            let specularCount = 0;
            for (let py = y; py < y + h; py += 2) {
                for (let px = x; px < x + w; px += 2) {
                    const idx = (py * W + px) * 4;
                    const r = data[idx], g = data[idx+1], b = data[idx+2];
                    const bright = 0.299*r + 0.587*g + 0.114*b;
                    brightSum += bright;
                    blueSum += b;
                    redSum += r;
                    textureSum += Math.abs(bright - 128);
                    cnt++;
                    if (bright > CONFIG.WATER_MIN_BRIGHTNESS && Math.abs(r-g) < 30 && Math.abs(g-b) < 30) {
                        specularCount++;
                    }
                }
            }
            if (!cnt) return false;
            const avgBright = brightSum / cnt;
            const blueRedRatio = (redSum > 10) ? blueSum / redSum : 0;
            const texture = textureSum / cnt / 128;
            const specularRatio = specularCount / cnt;
            const isSpecular = specularRatio > 0.15 && avgBright > CONFIG.WATER_MIN_BRIGHTNESS;
            const isBlueish = blueRedRatio > CONFIG.WATER_COLOR_BLUE_THRESHOLD;
            const isSmooth = texture < CONFIG.WATER_TEXTURE_SMOOTH;
            return (isSpecular && isBlueish) || (isSpecular && isSmooth);
        }
        
        function detectDrop(imgData, prevImg, x, y, w, h) {
            if (!prevImg) return false;
            const data = imgData.data, prevData = prevImg.data;
            const W = imgData.width;
            let edgeContrast = 0;
            for (let px = x; px < x + w; px += 3) {
                const idx1 = (y * W + px) * 4;
                const idx2 = ((y+3) * W + px) * 4;
                if (idx2 < data.length) {
                    const b1 = 0.299*data[idx1] + 0.587*data[idx1+1] + 0.114*data[idx1+2];
                    const b2 = 0.299*data[idx2] + 0.587*data[idx2+1] + 0.114*data[idx2+2];
                    edgeContrast += Math.abs(b1 - b2);
                }
            }
            edgeContrast /= (w / 3);
            edgeContrast /= 255;
            let currVar = 0, prevVar = 0, cnt = 0;
            for (let py = y; py < y + h; py += 3) {
                for (let px = x; px < x + w; px += 3) {
                    const idx = (py * W + px) * 4;
                    const c = 0.299*data[idx] + 0.587*data[idx+1] + 0.114*data[idx+2];
                    const p = 0.299*prevData[idx] + 0.587*prevData[idx+1] + 0.114*prevData[idx+2];
                    currVar += Math.abs(c - 128);
                    prevVar += Math.abs(p - 128);
                    cnt++;
                }
            }
            if (!cnt) return false;
            currVar /= cnt; prevVar /= cnt;
            const textureLoss = prevVar > 0 ? Math.max(0, (prevVar - currVar) / prevVar) : 0;
            return edgeContrast > CONFIG.DROP_EDGE_CONTRAST && textureLoss > CONFIG.DROP_TEXTURE_LOSS;
        }
        
        function detectObstacle(imgData, prevImg, x, y, w, h, zoneAvg) {
            if (!prevImg) return false;
            const data = imgData.data, prevData = prevImg.data;
            const W = imgData.width;
            let currBright = 0, prevBright = 0, cnt = 0;
            for (let py = y; py < y + h; py += 2) {
                for (let px = x; px < x + w; px += 2) {
                    const idx = (py * W + px) * 4;
                    currBright += 0.299*data[idx] + 0.587*data[idx+1] + 0.114*data[idx+2];
                    prevBright += 0.299*prevData[idx] + 0.587*prevData[idx+1] + 0.114*prevData[idx+2];
                    cnt++;
                }
            }
            if (!cnt) return false;
            currBright /= cnt;
            prevBright /= cnt;
            const deviation = prevBright > 0 ? Math.abs(currBright - prevBright) / prevBright : 0;
            return deviation > state.adaptiveSensitivity.obstacle;
        }

        function isGlobalMotion(changedCells, totalCells) {
            return changedCells / totalCells > CONFIG.GLOBAL_MOTION_THRESHOLD;
        }

        function analyzeFrame() {
            if (!state.isRunning || !videoEl.videoWidth) return;
            canvas.width = CONFIG.WORK_WIDTH;
            canvas.height = CONFIG.WORK_HEIGHT;
            ctx.drawImage(videoEl, 0, 0, CONFIG.WORK_WIDTH, CONFIG.WORK_HEIGHT);
            const imgData = ctx.getImageData(0, 0, CONFIG.WORK_WIDTH, CONFIG.WORK_HEIGHT);
            let totalBright = 0;
            for (let i = 0; i < imgData.data.length; i += 4) {
                totalBright += imgData.data[i] + imgData.data[i+1] + imgData.data[i+2];
            }
            const sceneBright = totalBright / imgData.data.length / 3;
            updateAdaptation(sceneBright);
            const zones = [
                { name: 'head', y0: Math.floor(CONFIG.WORK_HEIGHT * CONFIG.ZONE_HEAD_START), y1: Math.floor(CONFIG.WORK_HEIGHT * CONFIG.ZONE_HEAD_END), sensitivity: state.adaptiveSensitivity.obstacle },
                { name: 'chest', y0: Math.floor(CONFIG.WORK_HEIGHT * CONFIG.ZONE_CHEST_START), y1: Math.floor(CONFIG.WORK_HEIGHT * CONFIG.ZONE_CHEST_END), sensitivity: state.adaptiveSensitivity.obstacle },
                { name: 'ground', y0: Math.floor(CONFIG.WORK_HEIGHT * CONFIG.ZONE_GROUND_START), y1: Math.floor(CONFIG.WORK_HEIGHT * CONFIG.ZONE_GROUND_END), sensitivity: state.adaptiveSensitivity.drop }
            ];
            let totalChanged = 0;
            const totalCells = CONFIG.GRID_COLS * zones.length * CONFIG.GRID_ROWS_PER_ZONE;
            for (const zone of zones) {
                const zoneH = (zone.y1 - zone.y0) / CONFIG.GRID_ROWS_PER_ZONE;
                const zoneW = CONFIG.WORK_WIDTH / CONFIG.GRID_COLS;
                for (let row = 0; row < CONFIG.GRID_ROWS_PER_ZONE; row++) {
                    for (let col = 0; col < CONFIG.GRID_COLS; col++) {
                        const x = col * zoneW;
                        const y = zone.y0 + row * zoneH;
                        if (zone.name === 'ground' && detectWater(imgData, x, y, zoneW, zoneH)) {
                            triggerWaterAlert(zone);
                            totalChanged++;
                            continue;
                        }
                        if (zone.name === 'ground' && state.prevFrame && detectDrop(imgData, state.prevFrame, x, y, zoneW, zoneH)) {
                            triggerDropAlert(zone);
                            totalChanged++;
                            continue;
                        }
                        if (state.prevFrame && detectObstacle(imgData, state.prevFrame, x, y, zoneW, zoneH, zone.y0)) {
                            triggerObstacleAlert(zone);
                            totalChanged++;
                        }
                    }
                }
            }
            if (isGlobalMotion(totalChanged, totalCells)) {
                state.prevFrame = imgData;
                return;
            }
            state.prevFrame = imgData;
            state.frameCount++;
        }
        
        function canAlert(zoneName, confirmFrames) {
            const zone = state.zones[zoneName];
            if (Date.now() - zone.lastAlert < CONFIG.ALERT_COOLDOWN) return false;
            zone.alerts++;
            if (zone.alerts >= confirmFrames) {
                zone.alerts = 0;
                zone.lastAlert = Date.now();
                state.lastAlertTime = Date.now();
                return true;
            }
            return false;
        }
        
        function triggerWaterAlert(zone) {
            if (canAlert('ground', CONFIG.CONFIRM_FRAMES_WATER)) {
                alertWater();
                state.alertStats.water++;
            }
        }
        
        function triggerDropAlert(zone) {
            if (canAlert('ground', CONFIG.CONFIRM_FRAMES_DROP)) {
                alertDrop();
                state.alertStats.drop++;
            }
        }
        
        function triggerObstacleAlert(zone) {
            const confirm = zone.name === 'head' ? 1 : CONFIG.CONFIRM_FRAMES_OBSTACLE;
            if (canAlert(zone.name, confirm)) {
                alertObstacle();
                state.alertStats.obstacle++;
            }
        }

        function initMotion() {
            if (!DEVICE.hasMotion) return;
            state.motionHandler = (e) => {
                if (!state.isRunning) return;
                const acc = e.accelerationIncludingGravity;
                if (!acc || acc.z === null) return;
                if (state.lastAccelZ !== null && Date.now() > state.accelCooldown) {
                    const delta = acc.z - state.lastAccelZ;
                    if (delta < -5.5) {
                        state.accelCooldown = Date.now() + 3000;
                        alertFall();
                        state.alertStats.fall++;
                        log('FALL DETECTED: ' + delta.toFixed(2));
                    }
                }
                state.lastAccelZ = acc.z;
            };
            window.addEventListener('devicemotion', state.motionHandler, { passive: true });
            log('Motion sensor active');
        }

        async function initBattery() {
            if (!DEVICE.hasBattery) return;
            try {
                state.batteryObj = await navigator.getBattery();
                const check = () => {
                    if (!state.isRunning || !state.batteryObj) return;
                    const level = Math.round(state.batteryObj.level * 100);
                    const now = Date.now();
                    if (!state.batteryObj.charging) {
                        for (const lvl of CONFIG.BATTERY_WARN_LEVELS) {
                            if (level <= lvl && now - state.lastBatteryWarn > CONFIG.BATTERY_WARN_COOLDOWN) {
                                speakText('Заряд ' + level + ' процентов', true);
                                vibratePhone([100, 50, 100]);
                                state.lastBatteryWarn = now;
                                if (level <= CONFIG.FRAME_SKIP_LOW_BATTERY) {
                                    log('Low battery: reducing FPS');
                                }
                                break;
                            }
                        }
                    }
                };
                state.batteryObj.addEventListener('levelchange', check);
                state.batteryObj.addEventListener('chargingchange', check);
                check();
                state.batteryTimer = setInterval(check, 30000);
                log('Battery monitor active');
            } catch(e) { log('Battery error: ' + e); }
        }
        
        function stopBattery() {
            if (state.batteryTimer) clearInterval(state.batteryTimer);
            if (state.batteryObj) {
                state.batteryObj.removeEventListener('levelchange', ()=>{});
                state.batteryObj.removeEventListener('chargingchange', ()=>{});
            }
        }

        function processingLoop() {
            if (!state.isRunning) return;
            analyzeFrame();
            const fps = state.batteryObj && !state.batteryObj.charging && state.batteryObj.level * 100 <= CONFIG.FRAME_SKIP_LOW_BATTERY 
                ? CONFIG.TARGET_FPS - 2 
                : CONFIG.TARGET_FPS;
            state.analysisTimer = setTimeout(() => requestAnimationFrame(processingLoop), 1000 / fps);
        }

        async function startSystem() {
            if (state.isRunning) return;
            if (!state.audioCtx) {
                try { state.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                catch(e) { log('AudioContext error: ' + e); }
            }
            startBtn.disabled = true;
            updateStatus('🟡 Инициализация...');
            log('Starting system...');
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 256 },
                        height: { ideal: 192 },
                        advanced: [{ exposureMode: 'continuous' }]
                    }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoEl.srcObject = stream;
                await videoEl.play();
                state.mediaStream = stream;
                state.videoTrack = stream.getVideoTracks()[0];
                state.isRunning = true;
                state.frameCount = 0;
                state.lastAlertTime = 0;
                state.brightnessHistory = [];
                state.prevFrame = null;
                for (let z in state.zones) { state.zones[z].alerts = 0; state.zones[z].lastAlert = 0; }
                initMotion();
                await initBattery();
                startHeartbeat();
                updateStatus('🟡 Калибровка 2 сек...');
                speakText('Калибрую');
                setTimeout(() => {
                    if (state.isRunning) {
                        state.isCalibrated = true;
                        updateStatus('🛡️ ЗАЩИТА АКТИВНА');
                        speakText('Защита включена');
                        vibratePhone([50, 30, 50]);
                        log('System ready');
                    }
                }, 2000);
                processingLoop();
            } catch(err) {
                log('Start error: ' + err.name + ': ' + err.message);
                let msg = 'Ошибка камеры';
                if (err.name === 'NotAllowedError') msg = 'Разрешите камеру';
                else if (err.name === 'NotFoundError') msg = 'Камера не найдена';
                else if (err.name === 'NotReadableError') msg = 'Камера занята';
                updateStatus('❌ ' + msg, 'error');
                speakText(msg);
                startBtn.disabled = false;
            }
        }

        function stopSystem() {
            state.isRunning = false;
            if (state.analysisTimer) clearTimeout(state.analysisTimer);
            if (state.heartbeatTimer) clearInterval(state.heartbeatTimer);
            if (state.mediaStream) state.mediaStream.getTracks().forEach(t => t.stop());
            if (state.motionHandler) window.removeEventListener('devicemotion', state.motionHandler);
            if (state.orientationHandler) window.removeEventListener('deviceorientation', state.orientationHandler);
            stopBattery();
            if (state.audioCtx) state.audioCtx.close().catch(()=>{});
            startBtn.disabled = false;
            updateStatus('⏹️ Остановлено');
            speakText('Защита выключена');
            vibratePhone(100);
            log('System stopped. Alerts: ' + JSON.stringify(state.alertStats));
        }

        // ============================================================
        // УПРАВЛЕНИЕ КНОПКОЙ: УДЕРЖАНИЕ 5 СЕКУНД
        // ============================================================
        let holdTimer = null;
        let isHolding = false;
        const HOLD_DURATION = 5000; // 5 секунд
        const btnSpan = startBtn.querySelector('span');

        function onHoldStart(e) {
            if (e.cancelable) e.preventDefault();
            isHolding = true;
            // Визуальная/тактильная обратная связь
            startBtn.style.opacity = '0.6';
            vibratePhone(30);
            btnSpan.textContent = state.isRunning ? 'УДЕРЖИВАЙТЕ ДЛЯ ВЫКЛ...' : 'УДЕРЖИВАЙТЕ ДЛЯ ВКЛ...';
            
            holdTimer = setTimeout(() => {
                if (isHolding) {
                    isHolding = false;
                    startBtn.style.opacity = '1';
                    vibratePhone([50, 30, 50]);
                    
                    if (!state.isRunning) {
                        startSystem();
                    } else {
                        stopSystem();
                        // Закрытие приложения/вкладки
                        window.close();
                        setTimeout(() => {
                            location.replace('about:blank');
                        }, 300);
                    }
                }
            }, HOLD_DURATION);
        }

        function onHoldCancel() {
            clearTimeout(holdTimer);
            isHolding = false;
            startBtn.style.opacity = '1';
            btnSpan.textContent = state.isRunning ? 'ВЫКЛЮЧИТЬ ЗАЩИТУ' : 'ВКЛЮЧИТЬ ЗАЩИТУ';
        }

        // Универсальные события для мыши и тачскрина
        startBtn.addEventListener('pointerdown', onHoldStart);
        startBtn.addEventListener('pointerup', onHoldCancel);
        startBtn.addEventListener('pointercancel', onHoldCancel);
        startBtn.addEventListener('pointerleave', onHoldCancel);
        
        updateStatus('⚫ Нажмите для включения');
        log('Anti-AI Glance loaded. Safety first.');
    </script>
</body>
</html>
